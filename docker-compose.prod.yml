services:
  n8n-turbo:
    image: n8n-turbo:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8n-turbo-main
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY}
      N8N_SETUP_EMAIL: ${N8N_SETUP_EMAIL:-owner@n8n.local}
      N8N_SETUP_PASSWORD: ${N8N_SETUP_PASSWORD:?set N8N_SETUP_PASSWORD}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:?set N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${WEBHOOK_URL:?set WEBHOOK_URL}
      DB_TYPE: postgres
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      DB_POSTGRESDB_SSL_MODE: disable
      DB_SQLITE_DATABASE: /app/data/database.sqlite
      N8N_TURBO_FRONTEND_DIR: /app/ui
      UI_PATH: /app/ui
      N8N_TURBO_BINARY_DATA_PATH: /app/storage/binary
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-warn}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      N8N_CONCURRENCY_PRODUCTION_LIMIT: ${N8N_CONCURRENCY_PRODUCTION_LIMIT:-20}
      N8N_EXECUTIONS_DATA_SAVE_ON_ERROR: all
      N8N_EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      N8N_EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
      N8N_EXECUTIONS_DATA_SAVE_ON_PROGRESS: "false"
    volumes:
      - n8n_data:/app/data
      - n8n_logs:/app/logs
      - n8n_storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  n8n_data:
  n8n_logs:
  n8n_storage:
  postgres_data:
